<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>媽祖魚護身符｜領獎登記</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --sea: #0077a8;
      --sea-light: #e0f4fb;
      --sea-dark: #004f72;
      --gold: #c8922a;
      --gold-light: #fdf3e3;
      --text: #1a2a35;
      --text-light: #5a7080;
      --surface: #ffffff;
      --border: #d0e8f0;
      --error: #c0392b;
      --success: #1a7a50;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang TC', 'Noto Sans TC', sans-serif;
      background: linear-gradient(160deg, #e8f6fc 0%, #f5f9e8 100%);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--sea-dark) 0%, var(--sea) 100%);
      color: white;
      padding: 28px 24px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      bottom: -20px; left: 0; right: 0;
      height: 40px;
      background: linear-gradient(160deg, #e8f6fc 0%, #f5f9e8 100%);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .header .fish { font-size: 2.5rem; margin-bottom: 8px; display: block; }
    .header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.05em; }
    .header p { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      margin: 32px 16px 24px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,119,168,0.1);
      padding: 24px 20px;
    }

    /* ── Loading / Error ── */
    #loading, #error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--sea);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-screen { color: var(--error); }
    #error-screen .icon { font-size: 2.5rem; }

    /* ── Form ── */
    #form-screen { display: none; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sea);
      border-bottom: 2px solid var(--sea-light);
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 6px;
    }
    .field label .req { color: var(--sea); margin-left: 2px; }

    .field input, .field select, .field textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: #fafcff;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--sea);
      box-shadow: 0 0 0 3px rgba(0,119,168,0.12);
    }
    .field input.locked {
      background: var(--sea-light);
      color: var(--sea-dark);
      font-weight: 600;
      cursor: default;
      border-color: var(--sea);
    }
    .field input.locked:focus {
      box-shadow: none;
    }

    .locked-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: var(--sea);
      font-weight: 600;
      margin-top: 4px;
    }
    .locked-badge svg { width: 12px; height: 12px; }

    .radio-group {
      display: flex;
      gap: 10px;
    }
    .radio-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 8px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.2s;
      background: #fafcff;
    }
    .radio-option input[type="radio"] { display: none; }
    .radio-option.selected {
      border-color: var(--sea);
      background: var(--sea-light);
      color: var(--sea-dark);
      font-weight: 700;
    }

    .date-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .date-option {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
      background: #fafcff;
    }
    .date-option input[type="radio"] { display: none; }
    .date-option.selected {
      border-color: var(--gold);
      background: var(--gold-light);
      color: var(--gold);
    }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--sea) 0%, var(--sea-dark) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(0,79,114,0.3);
    }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled {
      background: #b0c4cc;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ── Success ── */
    #success-screen {
      display: none;
      text-align: center;
      padding: 40px 24px;
    }
    #success-screen .icon { font-size: 4rem; margin-bottom: 16px; }
    #success-screen h2 { font-size: 1.3rem; color: var(--success); margin-bottom: 8px; }
    #success-screen p { color: var(--text-light); font-size: 0.9rem; line-height: 1.6; }

    .info-note {
      font-size: 0.78rem;
      color: var(--text-light);
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }
  </style>
</head>
<body>

<div class="header">
  <span class="fish">🐟</span>
  <h1>媽祖魚護身符｜領獎登記</h1>
  <p>海保署珊海俱樂部</p>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p style="color: var(--text-light); font-size: 0.9rem;">載入中...</p>
</div>

<!-- Error -->
<div id="error-screen" style="display:none;">
  <span class="icon">⚠️</span>
  <p id="error-msg">請在 LINE 應用程式中開啟此頁面</p>
</div>

<!-- Form -->
<div id="form-screen">
  <div class="card">
    <div class="section-label">兌換方式</div>
    <div class="field">
      <div class="radio-group">
        <label class="radio-option" id="opt-online">
          <input type="radio" name="exchange" value="線上兌換（郵寄）" />
          📦 線上兌換（郵寄）
        </label>
        <label class="radio-option" id="opt-offline">
          <input type="radio" name="exchange" value="實體兌換（現場領取）" />
          🏛️ 現場領取
        </label>
      </div>
    </div>
  </div>

  <!-- 線上兌換區塊 -->
  <div class="card" id="block-online" style="display:none;">
    <div class="section-label">線上兌換資料</div>

    <div class="field">
      <label>LINE ID <span class="req">*</span></label>
      <input type="text" id="line-id-online" class="locked" readonly placeholder="自動帶入" />
      <div class="locked-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        LINE 身份已驗證，無法修改
      </div>
    </div>

    <div class="field">
      <label>電子郵件 <span class="req">*</span></label>
      <input type="email" id="email" placeholder="your@email.com" />
    </div>

    <div class="field">
      <label>姓名 <span class="req">*</span></label>
      <input type="text" id="name-online" placeholder="請輸入真實姓名" />
    </div>

    <div class="field">
      <label>電話 <span class="req">*</span></label>
      <input type="tel" id="phone-online" placeholder="09XXXXXXXX" />
    </div>

    <div class="field">
      <label>郵遞區號 <span class="req">*</span></label>
      <input type="text" id="zipcode" placeholder="例如：400" maxlength="5" />
    </div>

    <div class="field">
      <label>收件地址 <span class="req">*</span></label>
      <input type="text" id="address" placeholder="縣市、鄉鎮市區、路段門號" />
    </div>
  </div>

  <!-- 現場領取區塊 -->
  <div class="card" id="block-offline" style="display:none;">
    <div class="section-label">現場領取資料</div>

    <div class="field">
      <label>LINE ID <span class="req">*</span></label>
      <input type="text" id="line-id-offline" class="locked" readonly placeholder="自動帶入" />
      <div class="locked-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        LINE 身份已驗證，無法修改
      </div>
    </div>

    <div class="field">
      <label>姓名 <span class="req">*</span></label>
      <input type="text" id="name-offline" placeholder="請輸入真實姓名" />
    </div>

    <div class="field">
      <label>電話 <span class="req">*</span></label>
      <input type="tel" id="phone-offline" placeholder="09XXXXXXXX" />
    </div>

    <div class="field">
      <label>兌換日期 <span class="req">*</span></label>
      <div class="date-grid">
        <label class="date-option" id="date-416">
          <input type="radio" name="date" value="4/16" /> 4/16（三）
        </label>
        <label class="date-option" id="date-418">
          <input type="radio" name="date" value="4/18" /> 4/18（五）
        </label>
        <label class="date-option" id="date-420">
          <input type="radio" name="date" value="4/20" /> 4/20（日）
        </label>
        <label class="date-option" id="date-421">
          <input type="radio" name="date" value="4/21" /> 4/21（一）
        </label>
      </div>
    </div>
  </div>

  <div style="padding: 0 16px 32px;">
    <button class="btn-submit" id="btn-submit" onclick="submitForm()" disabled>
      確認送出
    </button>
    <p class="info-note">送出後即完成領獎登記，資料將用於寄送護身符或現場核對。</p>
  </div>
</div>

<!-- Success -->
<div id="success-screen">
  <div class="icon">🎉</div>
  <h2>登記完成！</h2>
  <p>感謝您的登記，<br/>海保署珊海俱樂部將盡快為您處理。<br/><br/>若為現場領取，請於指定日期攜帶此畫面前往。</p>
</div>

<script>
  // ── 設定 ──────────────────────────────────────────
  const LIFF_ID = '2009590844-lqj65EHI';

  // Google Apps Script Web App URL（部署後填入）
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyzATMCp8DU416Q1dP3FYDZnbEORzluWAazzljxUSBMVvXJMGJZb6G9JfzKCxwUx5SQ/exec';
  // ─────────────────────────────────────────────────

  let lineUid = '';
  let lineDisplayName = '';

  // ── 初始化 LIFF ──
  async function initLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      lineUid = profile.userId;
      lineDisplayName = profile.displayName;

      // 填入兩個 LINE ID 欄位並鎖死
      document.getElementById('line-id-online').value = lineUid;
      document.getElementById('line-id-offline').value = lineUid;

      // 顯示表單
      document.getElementById('loading').style.display = 'none';
      document.getElementById('form-screen').style.display = 'block';

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-screen').style.display = 'flex';
      document.getElementById('error-msg').textContent =
        '載入失敗，請關閉後重新開啟。\n(' + err.message + ')';
    }
  }

  // ── 兌換方式切換 ──
  document.querySelectorAll('input[name="exchange"]').forEach(radio => {
    radio.addEventListener('change', function() {
      const isOnline = this.value.includes('線上');

      document.getElementById('opt-online').classList.toggle('selected', isOnline);
      document.getElementById('opt-offline').classList.toggle('selected', !isOnline);
      document.getElementById('block-online').style.display = isOnline ? 'block' : 'none';
      document.getElementById('block-offline').style.display = isOnline ? 'none' : 'block';
      document.getElementById('btn-submit').disabled = false;
    });
  });

  // ── 日期選擇 ──
  document.querySelectorAll('input[name="date"]').forEach(radio => {
    radio.addEventListener('change', function() {
      document.querySelectorAll('.date-option').forEach(el => el.classList.remove('selected'));
      this.closest('.date-option').classList.add('selected');
    });
  });

  // ── 送出 ──
  async function submitForm() {
    const exchangeType = document.querySelector('input[name="exchange"]:checked')?.value;
    if (!exchangeType) { alert('請選擇兌換方式'); return; }

    const isOnline = exchangeType.includes('線上');

    // 收集資料
    let data = {
      timestamp: new Date().toLocaleString('zh-TW'),
      lineUid: lineUid,
      lineDisplayName: lineDisplayName,
      exchangeType: exchangeType,
    };

    if (isOnline) {
      const email = document.getElementById('email').value.trim();
      const name  = document.getElementById('name-online').value.trim();
      const phone = document.getElementById('phone-online').value.trim();
      const zip   = document.getElementById('zipcode').value.trim();
      const addr  = document.getElementById('address').value.trim();

      if (!email || !name || !phone || !zip || !addr) {
        alert('請填寫所有必填欄位'); return;
      }
      data = { ...data, email, name, phone, zipcode: zip, address: addr };

    } else {
      const name  = document.getElementById('name-offline').value.trim();
      const phone = document.getElementById('phone-offline').value.trim();
      const date  = document.querySelector('input[name="date"]:checked')?.value;

      if (!name || !phone || !date) {
        alert('請填寫所有必填欄位，並選擇兌換日期'); return;
      }
      data = { ...data, name, phone, exchangeDate: date };
    }

    // 送出
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = '送出中...';

    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (result.status !== 'ok') throw new Error(result.message);

      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';

    } catch (err) {
      alert('送出失敗，請稍後再試。');
      btn.disabled = false;
      btn.textContent = '確認送出';
    }
  }

  // ── 啟動 ──
  initLiff();
</script>
</body>
</html>
